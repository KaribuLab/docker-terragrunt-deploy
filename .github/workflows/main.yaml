name: ci

on:
  push:
    branches:
      - "main"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: node-20
            dockerfile: ./node/Dockerfile-node
            tag: node-20
          - name: node-22-pnpm
            dockerfile: ./node/Dockerfile-node22-pnpm
            tag: node-22-pnpm
          - name: node-24-pnpm
            dockerfile: ./node/Dockerfile-node24-pnpm
            tag: node-24-pnpm
          - name: python-3.12
            dockerfile: ./python/Dockerfile-python-3.12
            tag: python-3.12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/terragrunt-deploy:${{ matrix.tag }}

  notify:
    runs-on: ubuntu-latest
    needs: build
    if: success()
    steps:
      - name: Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_CHANNEL: karibu-labs-it
          SLACK_COLOR: ${{ job.status }}
          SLACK_ICON: https://img.icons8.com/ios-filled/50/github.png
          SLACK_MESSAGE: "New version of Terragrunt Deploy (node-20, node-22-pnpm, node-24-pnpm, python-3.12) https://hub.docker.com/repository/docker/karibu/terragrunt-deploy/general :rocket:"
          SLACK_TITLE: New image version of Terragrunt Deploy
          SLACK_USERNAME: github-actions
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}